<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemma 4 LOMLOE Compiler</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-elements">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <main class="app-container">
        <header class="glass-panel">
            <h1>Gemma 4 <span>LOMLOE Compiler</span></h1>
            <p>De Situación de Aprendizaje a Proyecto eXeLearning (.elpx) vía WebGPU</p>
        </header>

        <section class="glass-panel config-panel">
            <div class="config-row">
                <div class="input-group">
                    <label for="model-select">Modelo Local (WebGPU)</label>
                    <select id="model-select">
                        <option value="onnx-community/gemma-4-E2B-it-ONNX">Gemma 4 E2B (Rápido)</option>
                        <option value="onnx-community/gemma-4-E4B-it-ONNX">Gemma 4 E4B (Preciso)</option>
                    </select>
                </div>
                <div class="status-indicator">
                    <span id="model-status-dot" class="dot offline"></span>
                    <span id="model-status-text">Modelo inactivo</span>
                </div>
            </div>
            <div class="progress-container" id="loading-progress" style="display: none;">
                <div class="progress-bar" id="progress-bar"></div>
                <span id="progress-text" class="progress-text">Cargando modelo...</span>
            </div>
        </section>

        <section class="glass-panel input-panel">
            <label for="sa-input">Texto de la Situación de Aprendizaje (SA):</label>
            <textarea id="sa-input" placeholder="Pega aquí la justificación, saberes, metodologías y criterios de evaluación de tu SA..."></textarea>
            
            <button id="btn-generate" class="action-button primary">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
                Generar Diseño y Compilar
            </button>
        </section>

        <section id="output-section" class="glass-panel output-panel" style="display: none;">
            <div class="output-header">
                <h2>Diseño Pedagógico Propuesto</h2>
                <button id="btn-download" class="action-button success" style="display: none;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                    Descargar Proyecto (.elpx)
                </button>
            </div>
            
            <div class="loading-spinner" id="generation-spinner">
                <div class="spinner"></div>
                <p>Analizando la SA y diseñando los iDevices...</p>
            </div>

            <div id="markdown-output" class="markdown-body"></div>
        </section>
    </main>

    <script type="module" src="app.js"></script>
</body>
</html>
